<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPN Field Brain Beta — Download</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        .dl-page { padding-top: 64px; min-height: 100vh; display: flex; flex-direction: column; }
        .dl-main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 24px;
        }
        .dl-card {
            background: var(--green-surface);
            border: 1px solid var(--green-border);
            border-radius: 16px;
            padding: 48px 40px;
            max-width: 520px;
            width: 100%;
            text-align: center;
        }
        .dl-icon { font-size: 56px; margin-bottom: 16px; }
        .dl-badge {
            display: inline-block;
            background: rgba(109,191,90,0.12);
            border: 1px solid var(--green-bright);
            border-radius: 20px;
            padding: 4px 14px;
            font-family: var(--font-heading);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--green-bright);
            margin-bottom: 20px;
        }
        .dl-card h1 {
            font-family: var(--font-heading);
            font-size: clamp(22px, 4vw, 30px);
            font-weight: 700;
            color: var(--white);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            line-height: 1.2;
        }
        .dl-card .dl-sub {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.7;
            margin-bottom: 32px;
        }
        .btn-download {
            display: inline-block;
            background: var(--green-accent);
            color: var(--white);
            border: none;
            border-radius: 10px;
            padding: 18px 40px;
            font-family: var(--font-heading);
            font-size: 17px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, transform 0.15s;
            margin-bottom: 24px;
            width: 100%;
            box-sizing: border-box;
        }
        .btn-download:hover { background: var(--green-bright); transform: translateY(-2px); }
        .install-steps {
            background: var(--green-mid);
            border: 1px solid var(--green-border);
            border-radius: 10px;
            padding: 20px 24px;
            text-align: left;
            margin-bottom: 24px;
        }
        .install-steps h3 {
            font-family: var(--font-heading);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 12px;
        }
        .install-step {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            margin-bottom: 10px;
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
        }
        .install-step:last-child { margin-bottom: 0; }
        .install-step-num {
            width: 22px;
            height: 22px;
            background: var(--green-accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            color: var(--white);
            flex-shrink: 0;
            margin-top: 1px;
        }
        .token-box {
            background: #0a140a;
            border: 1px solid #1a2a1a;
            border-radius: 8px;
            padding: 14px 16px;
            font-size: 12px;
            color: #4a6a4a;
            text-align: left;
            line-height: 1.6;
        }
        .token-box strong { color: #5a7a5a; }
        .dl-loading { color: var(--text-muted); font-size: 15px; }
        .dl-error {
            color: #e07070;
            background: rgba(192,57,43,0.1);
            border: 1px solid rgba(192,57,43,0.3);
            border-radius: 10px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .dl-error h2 { font-family: var(--font-heading); margin-bottom: 8px; color: #e07070; }
        .dl-error p { font-size: 13px; line-height: 1.6; }
        @media (max-width: 480px) {
            .dl-card { padding: 32px 20px; }
        }
    </style>
</head>
<body>

<nav class="nav">
    <div class="nav-inner">
        <a href="index.html" class="nav-logo">
            <img src="img/rpn-logo.png" alt="RPN Logo" class="nav-logo-img">
            <span class="nav-logo-text">Radio Prepper Network</span>
        </a>
        <div class="nav-links">
            <a href="index.html#about">About</a>
            <a href="index.html#app">Field Brain</a>
            <a href="beta.html" class="nav-cta">Beta Sign Up</a>
        </div>
    </div>
</nav>

<div class="dl-page">
    <div class="dl-main">
        <div class="dl-card" id="dlCard">
            <div class="dl-loading">&#8987; Verifying your access…</div>
        </div>
    </div>
</div>

<footer class="footer">
    <div class="container">
        <div class="footer-inner">
            <div class="footer-brand">
                <img src="img/rpn-logo.png" alt="RPN" class="footer-logo">
                <div>
                    <div class="footer-name">Radio Prepper Network</div>
                    <div class="footer-tagline">Stay Prepared. Stay Ready. Stay Connected.</div>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 Radio Prepper Network. All rights reserved.</p>
        </div>
    </div>
</footer>

<script>
const API     = 'https://rpn-server.onrender.com';
const APK_PATH = 'apk/rpn-field-brain.apk';

const params = new URLSearchParams(window.location.search);
const token  = params.get('token');

function showError(title, msg) {
    document.getElementById('dlCard').innerHTML =
        '<div class="dl-error"><h2>&#10005; ' + title + '</h2><p>' + msg + '</p></div>'
        + '<a href="beta.html" class="btn-download" style="display:block;text-decoration:none;">Sign up for beta access &rarr;</a>';
}

async function init() {
    if (!token) {
        showError('No Access Token', 'You need to sign up for the beta to download the app.');
        return;
    }

    let data;
    try {
        const res = await fetch(API + '/beta/verify/' + encodeURIComponent(token));
        if (res.status === 404) {
            showError('Invalid or Expired Link', 'This download link is not valid. Please sign up again or contact us if you think this is an error.');
            return;
        }
        if (!res.ok) throw new Error('Server error ' + res.status);
        data = await res.json();
    } catch(err) {
        showError('Connection Error', 'Could not reach the server. Please try again in a moment.');
        return;
    }

    const pageUrl = window.location.origin + window.location.pathname + '?token=' + token;

    document.getElementById('dlCard').innerHTML = `
        <div class="dl-icon">&#128737;</div>
        <div class="dl-badge">&#10003; Beta Access Confirmed</div>
        <h1>Thanks for joining<br>the RPN Beta</h1>
        <p class="dl-sub">Your feedback helps improve the app before the official release. Choose your platform below.</p>

        <div style="display:flex;flex-direction:column;gap:12px;margin-bottom:28px;">
            <a href="apk/rpn-field-brain.apk" class="btn-download" download style="margin-bottom:0;">
                &#128241; Android APK
            </a>
            <a href="exe/rpn-field-brain.exe" class="btn-download" download style="margin-bottom:0;background:#1a3a5a;">
                &#128187; Windows (.exe)
            </a>
            <a href="https://github.com/Scribbz89/rpn-desktop/releases/download/latest-build/RPN%20Field%20Brain-1.0.0.AppImage" class="btn-download" download style="margin-bottom:0;background:#2a1a4a;">
                &#128039; Linux (AppImage)
            </a>
        </div>

        <div class="install-steps">
            <h3>Android — how to install</h3>
            <div class="install-step"><div class="install-step-num">1</div><div>Download the APK and open your <strong style="color:var(--text);">Downloads</strong> folder.</div></div>
            <div class="install-step"><div class="install-step-num">2</div><div>Tap <strong style="color:var(--text);">rpn-field-brain.apk</strong> and allow install from unknown sources if prompted.</div></div>
            <div class="install-step"><div class="install-step-num">3</div><div>Tap <strong style="color:var(--text);">Install</strong>, open Field Brain and follow the setup guide.</div></div>
        </div>

        <div class="install-steps" style="margin-top:12px;">
            <h3>Windows — how to install</h3>
            <div class="install-step"><div class="install-step-num">1</div><div>Download the .exe — it's a portable app, no installer needed.</div></div>
            <div class="install-step"><div class="install-step-num">2</div><div>If Windows SmartScreen warns you, click <strong style="color:var(--text);">More info → Run anyway</strong>.</div></div>
            <div class="install-step"><div class="install-step-num">3</div><div>Field Brain will launch. Your data is saved in your user profile.</div></div>
        </div>

        <div class="install-steps" style="margin-top:12px;">
            <h3>Linux — how to install</h3>
            <div class="install-step"><div class="install-step-num">1</div><div>Download the AppImage and make it executable: <code style="color:var(--green-bright);">chmod +x rpn-field-brain.AppImage</code></div></div>
            <div class="install-step"><div class="install-step-num">2</div><div>Double-click or run it from terminal.</div></div>
        </div>

        <div class="token-box" style="margin-top:20px;">
            <strong>&#128279; Your personal download link</strong><br>
            Bookmark this page — it's your unique access link for future beta updates.<br>
            <span style="font-size:11px;word-break:break-all;color:#3a5a3a;">${pageUrl}</span>
        </div>
    `;
}

init();
</script>
</body>
</html>
